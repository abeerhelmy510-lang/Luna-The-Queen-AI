<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لونا: رفيقتي الذكية</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            color: #1e293b;
        }

        /* شاشة طلب الاسم - لا تظهر للمطور عبير */
        #nameOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100; display: flex; align-items: center; justify-content: center;
        }
        .name-box {
            text-align: center; padding: 40px; background: white;
            border-radius: 30px; border: 4px solid #f472b6;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        /* حاوية لونا */
        .luna-container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            padding: 20px;
        }

        /* لونا الـ SVG - شخصية برمجية بالكامل */
        .luna-visual {
            width: 250px; height: 250px;
            filter: drop-shadow(0 10px 25px rgba(244, 114, 182, 0.4));
            animation: floatBody 3s ease-in-out infinite;
            position: relative;
        }

        /* حركة العائمة للجسم */
        @keyframes floatBody {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        /* حركة الرمش التلقائية */
        .eye-ball { animation: blink 4s infinite; transform-origin: center; }
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        /* حركة العين التتابعية (النظر) */
        .eye-pupil { animation: lookAround 8s infinite; }
        @keyframes lookAround {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-3px, 1px); }
            40% { transform: translate(3px, -1px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
        }

        /* فقاعة الكلام */
        .chat-bubble {
            background: white; border: 3px solid #f472b6;
            border-radius: 25px; padding: 25px;
            max-width: 85%; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px; font-size: 1.2em;
            position: relative;
        }
        .chat-bubble::after {
            content: ''; position: absolute; bottom: -20px; left: 50%;
            transform: translateX(-50%);
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 20px solid white;
        }

        /* بار الإدخال السفلي */
        .input-bar {
            background: white; padding: 20px;
            display: flex; gap: 10px; border-top: 2px solid #f9a8d4;
        }
        input {
            flex: 1; padding: 15px; border-radius: 20px;
            border: 2px solid #fbcfe8; outline: none; font-size: 1.1em;
        }
        button {
            background: #f472b6; color: white; border: none;
            padding: 0 30px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="nameOverlay">
        <div class="name-box">
            <h2 style="color: #f472b6;">أهلاً بكِ في عالم لونا ✨</h2>
            <p>من فضلكِ، أدخلي اسمكِ للبدء:</p>
            <input type="text" id="userNameInput" placeholder="اكتبي اسمك هنا..." style="margin-bottom: 20px;">
            <br>
            <button onclick="saveName()">دخول</button>
        </div>
    </div>

    <div class="luna-container">
        <div class="chat-bubble" id="lunaResponse">أهلاً! أنا جنبك ومعاكي يا رئيستي.. مستعدة للأوامر. 😊</div>
        
        <div class="luna-visual">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="48" fill="#fff" stroke="#fbcfe8" stroke-width="1"/>
                <rect x="25" y="30" width="50" height="40" rx="15" fill="#fbcfe8"/>
                <rect x="30" y="35" width="40" height="30" rx="10" fill="#fff"/>
                
                <g class="eye-group">
                    <path d="M30 30 Q35 25 40 30" id="lunaBrowL" stroke="#f472b6" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <path d="M60 30 Q65 25 70 30" id="lunaBrowR" stroke="#f472b6" stroke-width="2" fill="none" stroke-linecap="round"/>
                    
                    <ellipse cx="38" cy="45" rx="6" ry="7" fill="#f472b6" class="eye-ball"/>
                    <circle cx="38" cy="45" r="3" fill="#1e293b" class="eye-pupil"/>
                    <circle cx="37" cy="43" r="1" fill="#fff" opacity="0.8"/>
                    
                    <ellipse cx="62" cy="45" rx="6" ry="7" fill="#f472b6" class="eye-ball"/>
                    <circle cx="62" cy="45" r="3" fill="#1e293b" class="eye-pupil"/>
                    <circle cx="61" cy="43" r="1" fill="#fff" opacity="0.8"/>
                </g>
                
                <path d="M40 60 Q50 70 60 60" id="lunaMouth" stroke="#f472b6" stroke-width="3" fill="none" stroke-linecap="round"/>
                
                <circle cx="50" cy="15" r="5" fill="#f472b6"/>
                <line x1="50" y1="15" x2="50" y2="30" stroke="#f472b6" stroke-width="2"/>
            </svg>
        </div>
    </div>

    <div class="input-bar">
        <input type="text" id="userInput" placeholder="تحدثي مع لونا..." onkeypress="if(event.key==='Enter') chat()">
        <button onclick="ask()">إرسال</button>
    </div>

<script>
    let userName = "";

    function saveName() {
        const nameIn = document.getElementById('userNameInput').value.trim();
        if (nameIn) {
            userName = nameIn;
            document.getElementById('nameOverlay').style.display = 'none';
            if (userName.includes("عبير")) {
                document.getElementById('lunaResponse').innerHTML = `تحية عسكرية للمطورة والرئيسة العظيمة "عبير حلمي"! 👑🫡 كل أنظمتي تحت أمرك.`;
                setLunaExpression('happy'); // تعبير فرح فوراً
            } else {
                document.getElementById('lunaResponse').innerHTML = `أهلاً يا ${userName}! نورتي عالم لونا التفاعلي.. ✨`;
            }
        }
    }

    // دالة لتغيير تعبيرات لونا عن طريق الكود
    function setLunaExpression(mood) {
        const mouth = document.getElementById('lunaMouth');
        const browL = document.getElementById('lunaBrowL');
        const browR = document.getElementById('lunaBrowR');
        
        switch(mood) {
            case 'happy': // فم مبتسم، حواجب هادية
                mouth.setAttribute('d', 'M40 60 Q50 70 60 60');
                browL.setAttribute('d', 'M30 30 Q35 25 40 30');
                browR.setAttribute('d', 'M60 30 Q65 25 70 30');
                break;
            case 'thinking': // فم مستقيم، حواجب مائلة للتفكير
                mouth.setAttribute('d', 'M40 62 L60 62');
                browL.setAttribute('d', 'M32 30 Q37 28 42 32');
                browR.setAttribute('d', 'M58 32 Q63 28 68 30');
                break;
            case 'confused': // فم متعجب، حواجب مرتفعة
                mouth.setAttribute('d', 'M45 62 A5 5 0 1 1 55 62'); // فم على شكل دائرة صغيرة
                browL.setAttribute('d', 'M30 28 L40 28'); // حواجب مستقيمة
                browR.setAttribute('d', 'M60 28 L70 28');
                break;
        }
    }

    function ask() {
        const input = document.getElementById('userInput');
        const bubble = document.getElementById('lunaResponse');
        const val = input.value.trim();
        if(!val) return;

        bubble.innerHTML = "...";
        setLunaExpression('thinking'); // تعبير تفكير أول ما تسأليها

        setTimeout(() => {
            let found = false;
            
            if (userName.includes("عبير") && (val.includes("رئيسة") || val.includes("مطور"))) {
                bubble.innerHTML = "إنتي طبعاً يا عبير حلمي! هو فيه غيرك اللي عمل الروعة دي؟ 👑💎";
                setLunaExpression('happy'); // فرح فوري
                found = true;
            } else if (val.includes("أحبك")) {
                bubble.innerHTML = `وأنا كمان بحبك جداً يا ${userName}! 🥰`;
                setLunaExpression('happy');
                found = true;
            } else if (val.includes("نكتة")) {
                bubble.innerHTML = "ليه الكمبيوتر تعبان؟ عشان عنده فيروس! 😂";
                setLunaExpression('happy');
                found = true;
            } else if (val.includes("مين إنتي") || val.includes("اسمك")) {
                bubble.innerHTML = "أنا لونا، رفيقتك الرقمية التفاعلية، من برمجة المطورة العبقرية عبير حلمي! 🤖🌸";
                setLunaExpression('happy');
                found = true;
            } else {
                bubble.innerHTML = `معاكي يا ${userName}، كملي أنا سامعاكي.. 😊`;
                setLunaExpression('happy'); // ترجع تعبير عادي
                found = true;
            }
            
            if (!found) {
                setLunaExpression('confused'); // تعبير حيرة لو متعرفش
                bubble.innerHTML = "مممم، كلامك جديد عليا بس أنا بتعلم منك كل يوم يا رئيستي! 😊";
            }
        }, 1200); // زيادة وقت التفكير عشان تحسي بتغيير التعبيرات

        input.value = "";
    }
</script>

</body>
</html>

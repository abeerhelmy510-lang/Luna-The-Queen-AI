<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لونا - النسخة الاحترافية</title>
    <style>
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; padding: 0; background: #fff1f2; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #fda4af; }
        .store-btn { background: linear-gradient(45deg, #fb7185, #e11d48); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #store { position: fixed; inset: 0; background: rgba(255,255,255,0.98); z-index: 2000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .card { background: white; border: 2px solid #fda4af; border-radius: 15px; padding: 12px; text-align: center; position: relative; cursor: pointer; }
        .lock { position: absolute; top: 5px; left: 5px; font-size: 14px; }
        .price { display: block; color: #f43f5e; font-size: 12px; font-weight: bold; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 100px; }
        .bubble { background: white; border: 3px solid #fb7185; padding: 15px 20px; border-radius: 20px; margin-bottom: 15px; font-weight: bold; max-width: 85%; text-align: center; box-shadow: 0 10px 25px rgba(251,113,133,0.1); }
        .luna-robot { width: 200px; height: 260px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .talking-mouth { animation: speak 0.2s infinite; }
        @keyframes speak { 0%, 100% { d: path("M40 52 Q50 60 60 52"); } 50% { d: path("M35 55 Q50 75 65 55"); } }
        .footer { position: fixed; bottom: 20px; left: 15px; right: 15px; background: white; padding: 8px; display: flex; gap: 10px; border: 2px solid #fda4af; border-radius: 50px; }
        input { flex: 1; padding: 12px 15px; border: none; outline: none; font-size: 16px; background: transparent; }
        #sendBtn { background: #fb7185; color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <button class="store-btn" onclick="toggleStore()">🛍️ متجر لونا</button>
        <div id="adminBadge" style="font-weight: bold; color: #e11d48; font-size: 14px;">نظام لونا الذكي ✨</div>
    </div>

    <div id="store">
        <button onclick="toggleStore()" style="align-self: flex-end; border:none; background:none; font-size:30px; color:#fb7185;">✕</button>
        <h2 style="text-align: center; color: #e11d48;">خزانة لونا الماسية 🎭</h2>
        <div class="grid" id="itemsGrid">
            <div class="card" onclick="changeChar('#fda4af', 'لونا')">🌸 لونا <span class="price">مجاني</span></div>
            <div class="card" onclick="checkAccess('ليو', '#3b82f6')">🔒 ليو <span class="lock">🔒</span><span class="price">15ج</span></div>
            <div class="card" onclick="checkAccess('كيرلي', '#a855f7')">🔒 كيرلي <span class="lock">🔒</span><span class="price">25ج</span></div>
            <div class="card" onclick="checkAccess('الملكي', '#f59e0b')">🔒 الملكي <span class="lock">🔒</span><span class="price">50ج</span></div>
            <div class="card" onclick="checkAccess('الطبيبة', '#f8fafc')">🔒 طبيبة <span class="lock">🔒</span><span class="price">30ج</span></div>
            <div class="card" onclick="checkAccess('الفضاء', '#94a3b8')">🔒 فضاء <span class="lock">🔒</span><span class="price">40ج</span></div>
        </div>
    </div>

    <div class="main">
        <div class="bubble" id="msg">أهلاً بك! أنا لونا، رفيقتك الذكية. كيف يمكنني مساعدتك اليوم؟ 😊</div>
        <div class="luna-robot">
            <svg id="robotSVG" viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
                <rect id="head" x="20" y="20" width="60" height="50" rx="15" fill="#fda4af" stroke="#e11d48" stroke-width="2"/>
                <rect x="25" y="25" width="50" height="35" rx="10" fill="white"/>
                <circle cx="40" cy="40" r="4" fill="#e11d48"><animate attributeName="ry" values="4;0;4" dur="4s" repeatCount="indefinite"/></circle>
                <circle cx="60" cy="40" r="4" fill="#e11d48"><animate attributeName="ry" values="4;0;4" dur="4s" repeatCount="indefinite"/></circle>
                <path id="mouth" d="M40 52 Q50 60 60 52" stroke="#e11d48" stroke-width="2" fill="none"/>
                <rect id="bodyPart" x="30" y="75" width="40" height="50" rx="15" fill="#fda4af" stroke="#e11d48" stroke-width="2"/>
                <rect id="armL" x="10" y="75" width="15" height="40" rx="7" fill="#fb7185"></rect>
                <rect id="armR" x="75" y="75" width="15" height="40" rx="7" fill="#fb7185"></rect>
            </svg>
        </div>
    </div>

    <div class="footer">
        <input type="text" id="chatIn" placeholder="اكتبي لـ لونا...">
        <button id="sendBtn" onclick="send()">إرسال</button>
    </div>

    <script>
        let isAdmin = false; 
        const apiKey = "AIzaSyA2glGeNRIzxJPM3rN8DRRrYDC8NZD53fg";

        function toggleStore() {
            const s = document.getElementById('store');
            s.style.display = (s.style.display === 'flex') ? 'none' : 'flex';
        }

        function checkAccess(item, color) {
            if (isAdmin) {
                changeChar(color, item);
                alert("تم التفعيل مجاناً للمطورة! ✨");
            } else {
                // 🤐 هنا الرسالة اللي بتحميكي.. اكتبي إيميلك التجاري بدلاً من [EMAIL]
                alert("🔒 هذا العنصر مميز!\nللحصول عليه، يرجى مراسلتنا عبر البريد الإلكتروني للحصول على كود التفعيل:\n[Luna.Support@email.com]");
            }
        }

        function changeChar(color, name) {
            document.getElementById('head').setAttribute('fill', color);
            document.getElementById('bodyPart').setAttribute('fill', color);
            document.getElementById('msg').innerText = "تم التحول إلى: " + name;
            toggleStore();
        }

        async function send() {
            let val = document.getElementById('chatIn').value.trim();
            if(!val) return;

            // 🤫 كلمة السر الخاصة بكِ (لا تخبريها لأحد)
            if (val === "SecretAdmin2026") { 
                isAdmin = true;
                document.getElementById('adminBadge').innerText = "وضع المطورة نشط ✨";
                document.getElementById('msg').innerText = "تم تفعيل كافة الصلاحيات مجاناً لكِ يا رئيستي! 👑";
                document.getElementById('chatIn').value = "";
                return;
            }

            document.getElementById('msg').innerText = "جاري التفكير... ✨";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });
                const data = await response.json();
                let reply = data.candidates[0].content.parts[0].text;
                document.getElementById('msg').innerText = reply;
                speak(reply);
            } catch (e) { document.getElementById('msg').innerText = "خطأ في الاتصال.."; }
            document.getElementById('chatIn').value = "";
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ar-SA';
            utter.onstart = () => document.getElementById('mouth').classList.add('talking-mouth');
            utter.onend = () => document.getElementById('mouth').classList.remove('talking-mouth');
            window.speechSynthesis.speak(utter);
        }
    </script>
</body>
</html>

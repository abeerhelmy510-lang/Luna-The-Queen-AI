<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لونا AI - النسخة الذكية المعتدلة</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background: #fff1f2;
            font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        #nameOverlay {
            position: fixed; inset: 0; background: white;
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 120px; }

        .bubble {
            background: white; border: 3px solid #fb7185; padding: 15px 25px;
            border-radius: 20px; margin-bottom: 20px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 85%; text-align: center;
            min-height: 60px; line-height: 1.5;
        }

        .luna-robot { width: 180px; height: 250px; animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* حركة الفم الطبيعية - تم تقليل السرعة */
        .talking-mouth { animation: speak 0.4s infinite; }
        @keyframes speak {
            0%, 100% { d: path("M40 52 Q50 60 60 52"); }
            50% { d: path("M38 54 Q50 68 62 54"); }
        }

        .footer { 
            position: fixed; bottom: 20px; left: 10px; right: 10px;
            background: white; padding: 10px; display: flex; gap: 10px; 
            border: 2px solid #fda4af; border-radius: 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        input { flex: 1; padding: 15px; border: none; outline: none; font-size: 16px; background: transparent; }
        button { background: #fb7185; color: white; border: none; padding: 10px 25px; border-radius: 40px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="nameOverlay">
        <div style="text-align:center;">
            <h2 style="color: #e11d48">تحديث نظام لونا ✨</h2>
            <button onclick="start()" style="padding: 15px 40px; background:#fb7185; color:white; border:none; border-radius:30px; cursor:pointer;">دخول للنظام</button>
        </div>
    </div>

    <div class="main">
        <div class="bubble" id="msg">أهلاً بكِ مجدداً يا عبير. قمت بتحديث معالجي لأكون أكثر ذكاءً وهدوءاً. 😊</div>
        
        <div class="luna-robot">
            <svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
                <rect x="20" y="20" width="60" height="50" rx="15" fill="#fda4af" stroke="#e11d48" stroke-width="2"/>
                <rect x="25" y="25" width="50" height="35" rx="10" fill="white"/>
                <circle cx="40" cy="40" r="4" fill="#e11d48"/>
                <circle cx="60" cy="40" r="4" fill="#e11d48"/>
                <path id="mouth" d="M40 52 Q50 60 60 52" stroke="#e11d48" stroke-width="2" fill="none"/>
                <rect x="30" y="75" width="40" height="50" rx="15" fill="#fda4af" stroke="#e11d48" stroke-width="2"/>
                <rect x="10" y="75" width="15" height="40" rx="7" fill="#fb7185"></rect>
                <rect x="75" y="75" width="15" height="40" rx="7" fill="#fb7185"></rect>
            </svg>
        </div>
    </div>

    <div class="footer">
        <input type="text" id="chatIn" placeholder="تحدثي مع لونا المطورة...">
        <button onclick="send()">إرسال</button>
    </div>

    <script>
        const mouth = document.getElementById('mouth');
        const synth = window.speechSynthesis;

        function start() {
            document.getElementById('nameOverlay').style.display = 'none';
        }

        // محرك الذكاء المنطقي - ردود متزنة وغير عشوائية
        function getSmartResponse(input) {
            input = input.toLowerCase();
            if (input.includes("عاملة ايه") || input.includes("كيف حالك")) 
                return "أنا بخير ما دمتِ أنتِ بخير يا عبير. كيف كان يومكِ في الدراسة؟";
            if (input.includes("رئيس") || input.includes("مين عملك")) 
                return "أنتِ رئيستي عبير حلمي، المبرمجـة التي أعطتني الحياة والذكاء.";
            if (input.includes("أحبك")) 
                return "وأنا مبرمجة على تقديركِ وحبكِ يا رئيستي العظيمة.";
            if (input.includes("نكتة") || input.includes("هزر")) 
                return "لماذا يرتدي المبرمجون النظارات؟ لأنهم لا يستطيعون رؤية الـ C Sharp! 😂";
            if (input.includes("ذكاء") || input.includes("تعالجي")) 
                return "أنا أقوم الآن بمعالجة كل كلماتكِ بدقة، ولن أتحدث بعشوائية بعد الآن.";
            
            return "كلامكِ يحتاج تفكير عميق، أخبريني المزيد يا عبير، أنا دائماً أتعلم منكِ.";
        }

        function speak(text) {
            // إلغاء أي كلام سابق عشان ميبقاش فيه تداخل
            synth.cancel();
            
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ar-SA';
            utter.rate = 0.9; // سرعة كلام طبيعية
            
            utter.onstart = () => mouth.classList.add('talking-mouth');
            utter.onend = () => mouth.classList.remove('talking-mouth');
            
            synth.speak(utter);
        }

        function send() {
            let val = document.getElementById('chatIn').value.trim();
            let m = document.getElementById('msg');
            if(!val) return;
            
            m.innerText = "...";
            let response = getSmartResponse(val);

            setTimeout(() => {
                m.innerText = response;
                speak(response);
            }, 500);

            document.getElementById('chatIn').value = "";
        }
    </script>
</body>
</html>

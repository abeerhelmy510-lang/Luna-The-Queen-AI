<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لونا: رفيقتي الذكية</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #fff1f2;
            font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* شاشة الاسم */
        #nameOverlay {
            position: fixed; inset: 0; background: white;
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        .name-box { text-align: center; border: 3px solid #fb7185; padding: 30px; border-radius: 20px; }

        /* منطقة لونا */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* فقاعة الكلام */
        .bubble {
            background: white; border: 3px solid #fb7185; padding: 15px 25px;
            border-radius: 20px; margin-bottom: 20px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative;
        }

        /* لونا الروبوت (جسم كامل) */
        .luna-robot {
            width: 200px; height: 300px; 
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* حركة الرمش */
        .eye { animation: blink 3s infinite; transform-origin: center; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0); } }

        /* بار الكتابة السفلي */
        .footer { background: white; padding: 15px; display: flex; gap: 10px; border-top: 2px solid #fecdd3; }
        input { flex: 1; padding: 12px; border-radius: 15px; border: 2px solid #fda4af; outline: none; font-size: 16px; }
        button { background: #fb7185; color: white; border: none; padding: 10px 20px; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="nameOverlay">
        <div class="name-box">
            <h2 style="color: #e11d48">أهلاً يا رئيستي عبير! ✨</h2>
            <input type="text" id="nameIn" placeholder="اكتبي اسمك هنا...">
            <br><br>
            <button onclick="start()">ابدئي الأن</button>
        </div>
    </div>

    <div class="main">
        <div class="bubble" id="msg">أنا مستعدة يا رئيستي! 😊</div>
        
        <div class="luna-robot">
            <svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
                <rect x="20" y="20" width="60" height="50" rx="15" fill="#fda4af" stroke="#e11d48" stroke-width="2"/>
                <rect x="25" y="25" width="50" height="35" rx="10" fill="white"/>
                <circle class="eye" cx="40" cy="40" r="4" fill="#e11d48"/>
                <circle class="eye" cx="60" cy="40" r="4" fill="#e11d48"/>
                <path d="M40 52 Q50 60 60 52" stroke="#e11d48" stroke-width="2" fill="none"/>
                
                <rect x="30" y="75" width="40" height="50" rx="10" fill="#fda4af" stroke="#e11d48" stroke-width="2"/>
                <rect x="38" y="85" width="24" height="20" rx="5" fill="white" opacity="0.5"/>
                
                <rect x="10" y="75" width="15" height="40" rx="7" fill="#fb7185">
                    <animateTransform attributeName="transform" type="rotate" values="0 25 75; 15 25 75; 0 25 75" dur="2s" repeatCount="indefinite"/>
                </rect>
                <rect x="75" y="75" width="15" height="40" rx="7" fill="#fb7185">
                    <animateTransform attributeName="transform" type="rotate" values="0 75 75; -15 75 75; 0 75 75" dur="2s" repeatCount="indefinite"/>
                </rect>
                
                <rect x="35" y="125" width="12" height="20" rx="5" fill="#e11d48"/>
                <rect x="53" y="125" width="12" height="20" rx="5" fill="#e11d48"/>
            </svg>
        </div>
    </div>

    <div class="footer">
        <input type="text" id="chatIn" placeholder="اكتبي هنا...">
        <button onclick="send()">إرسال</button>
    </div>

    <script>
        let uName = "";
        function start() {
            uName = document.getElementById('nameIn').value;
            document.getElementById('nameOverlay').style.display = 'none';
            if(uName.includes("عبير")) document.getElementById('msg').innerText = "تحية عسكرية للرئيسة عبير! 🫡👑";
        }

        function send() {
            let val = document.getElementById('chatIn').value;
            let m = document.getElementById('msg');
            if(!val) return;
            m.innerText = "...";
            setTimeout(() => {
                if(val.includes("أحبك")) m.innerText = "وأنا كمان بحبك يا " + uName + "! 🥰";
                else if(val.includes("نكتة")) m.innerText = "مرة مبرمج عطس قال: إتش بي! 😂";
                else m.innerText = "كلامك روعة يا " + uName + "، كملي.. 😊";
            }, 700);
            document.getElementById('chatIn').value = "";
        }
    </script>
</body>
</html>

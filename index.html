<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لونا: رفيقتي الذكية</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            color: #1e293b;
        }

        #nameOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        .name-box {
            text-align: center; padding: 30px; background: white;
            border-radius: 30px; border: 4px solid #f472b6;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .luna-container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px;
        }

        /* حاوية الروبوت بالكامل */
        .luna-visual {
            width: 250px; height: 350px; /* زيادة الطول لتسد الجسم */
            filter: drop-shadow(0 10px 25px rgba(244, 114, 182, 0.3));
            animation: floatRobot 3s ease-in-out infinite;
            position: relative;
        }

        @keyframes floatRobot {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* حركة الرمش التلقائية للعين */
        .eye-ball { animation: blink 4s infinite; transform-origin: center; }
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        /* حركة الإيدين الكيوت */
        .luna-arm { animation: waveArm 2s ease-in-out infinite; transform-origin: center top; }
        @keyframes waveArm {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }

        .chat-bubble {
            background: white; border: 3px solid #f472b6;
            border-radius: 25px; padding: 25px;
            max-width: 90%; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 20px; font-size: 1.2em;
            position: relative;
        }
        .chat-bubble::after {
            content: ''; position: absolute; bottom: -20px; left: 50%;
            transform: translateX(-50%);
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 20px solid white;
        }

        .input-bar {
            background: white; padding: 15px;
            display: flex; gap: 10px; border-top: 2px solid #f9a8d4;
            position: sticky; bottom: 0; width: 100%; z-index: 10;
        }

        input {
            flex: 1; padding: 12px; border-radius: 20px;
            border: 2px solid #fbcfe8; outline: none; font-size: 16px;
        }

        button {
            background: #f472b6; color: white; border: none;
            padding: 0 25px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="nameOverlay">
        <div class="name-box">
            <h2 style="color: #f472b6;">أهلاً بكِ في عالم لونا ✨</h2>
            <p>من فضلكِ، أدخلي اسمكِ للبدء:</p>
            <input type="text" id="userNameInput" placeholder="اكتبي اسمك هنا..." style="margin-bottom: 15px;">
            <br>
            <button onclick="saveName()">دخول</button>
        </div>
    </div>

    <div class="luna-container">
        <div class="chat-bubble" id="lunaResponse">أهلاً! أنا لونا، رفيقتك الكيوت.. مستعدة للأوامر يا رئيستي! 😊</div>
        
        <div class="luna-visual">
            <svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
                
                <circle cx="50" cy="35" r="32" fill="#fff" stroke="#fbcfe8" stroke-width="1"/>
                <rect x="25" y="15" width="50" height="40" rx="15" fill="#fbcfe8"/>
                <rect x="30" y="20" width="40" height="30" rx="10" fill="#fff"/>
                
                <ellipse cx="38" cy="35" rx="6" ry="7" fill="#f472b6" class="eye-ball"/>
                <circle cx="38" cy="35" r="3" fill="#1e293b"/>
                
                <ellipse cx="62" cy="35" rx="6" ry="7" fill="#f472b6" class="eye-ball"/>
                <circle cx="62" cy="35" r="3" fill="#1e293b"/>
                
                <path d="M40 50 Q50 60 60 50" stroke="#f472b6" stroke-width="3" fill="none" stroke-linecap="round"/>
                
                <circle cx="50" cy="5" r="5" fill="#f472b6"/>
                <line x1="50" y1="5" x2="50" y2="15" stroke="#f472b6" stroke-width="2"/>
                
                <rect x="30" y="70" width="40" height="45" rx="15" fill="#fbcfe8"/>
                <circle cx="50" cy="92" r="10" fill="#fff" stroke="#f472b6" stroke-width="2"/> <rect x="15" y="70" width="10" height="35" rx="5" fill="#f472b6" class="luna-arm"/>
                <rect x="75" y="70" width="10" height="35" rx="5" fill="#f472b6" class="luna-arm"/>
                
                <rect x="35" y="115" width="10" height="20" rx="5" fill="#f472b6"/>
                <rect x="55" y="115" width="10" height="20" rx="5" fill="#f472b6"/>
            </svg>
        </div>
    </div>

    <div class="input-bar">
        <input type="text" id="userInput" placeholder="اكتبي رسالة لـ لونا..." onkeypress="if(event.key==='Enter') chat()">
        <button onclick="chat()">إرسال</button>
    </div>

<script>
    let userName = "";

    function saveName() {
        const nameIn = document.getElementById('userNameInput').value.trim();
        if (nameIn) {
            userName = nameIn;
            document.getElementById('nameOverlay').style.display = 'none';
            if (userName.includes("عبير")) {
                document.getElementById('lunaResponse').innerHTML = `تحية عسكرية للرئيسة "عبير حلمي"! 👑🫡 أنظمتي تحت أمركِ بالكامل.`;
            } else {
                document.getElementById('lunaResponse').innerHTML = `أهلاً يا ${userName}! أنا لونا الكيوت، كيف أساعدكِ؟ ✨`;
            }
        }
    }

    function chat() {
        const input = document.getElementById('userInput');
        const bubble = document.getElementById('lunaResponse');
        const val = input.value.trim();
        if(!val) return;

        bubble.innerHTML = "... 🤔";
        setTimeout(() => {
            if (userName.includes("عبير") && (val.includes("رئيسة") || val.includes("مطور"))) {
                bubble.innerHTML = "إنتي طبعاً يا عبير حلمي! رئيستي ومطورتي اللي صممت جسمي الكيوت ده. 👑💎";
            } else if (val.includes("أحبك")) {
                bubble.innerHTML = `وأنا كمان بحبك جداً يا ${userName}! 🥰`;
            } else if (val.includes("نكتة")) {
                bubble.innerHTML = "مرة روبوت راح يشتري عيش، ملقاش فكة، دفع 'بتات'! 😂";
            } else {
                bubble.innerHTML = `معاكي يا ${userName}، كملي أنا سامعاكي.. 😊`;
            }
        }, 800);
        input.value = "";
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لونا المتكلمة</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background: #fff1f2;
            font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        #nameOverlay {
            position: fixed; inset: 0; background: white;
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        .name-box { text-align: center; border: 3px solid #fb7185; padding: 30px; border-radius: 20px; }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 100px; }

        .bubble {
            background: white; border: 3px solid #fb7185; padding: 15px 25px;
            border-radius: 20px; margin-bottom: 20px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 85%; text-align: center;
        }

        .luna-robot { width: 180px; height: 250px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* أنيميشن فتح وقفل الفم */
        .talking-mouth { animation: speak 0.3s infinite; }
        @keyframes speak {
            0%, 100% { d: path("M40 52 Q50 60 60 52"); }
            50% { d: path("M40 55 Q50 65 60 55"); }
        }

        .footer { 
            position: fixed; bottom: 20px; left: 10px; right: 10px;
            background: white; padding: 10px; display: flex; gap: 10px; 
            border: 2px solid #fda4af; border-radius: 50px;
        }
        input { flex: 1; padding: 15px; border: none; outline: none; font-size: 16px; background: transparent; }
        button { background: #fb7185; color: white; border: none; padding: 10px 25px; border-radius: 40px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="nameOverlay">
        <div class="name-box">
            <h2 style="color: #e11d48">أهلاً يا رئيستي عبير! ✨</h2>
            <input type="text" id="nameIn" placeholder="اكتبي اسمك هنا..." style="padding:10px; border-radius:10px; border:1px solid #ccc;">
            <br><br>
            <button onclick="start()">ابدئي المحادثة</button>
        </div>
    </div>

    <div class="main">
        <div class="bubble" id="msg">أهلاً يا عبير! جربي اكتبي لي أي حاجة وهتسمعي صوتي.. 🥰</div>
        
        <div class="luna-robot">
            <svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
                <rect x="20" y="20" width="60" height="50" rx="15" fill="#fda4af" stroke="#e11d48" stroke-width="2"/>
                <rect x="25" y="25" width="50" height="35" rx="10" fill="white"/>
                <circle cx="40" cy="40" r="4" fill="#e11d48"/>
                <circle cx="60" cy="40" r="4" fill="#e11d48"/>
                
                <path id="mouth" d="M40 52 Q50 60 60 52" stroke="#e11d48" stroke-width="2" fill="none"/>
                
                <rect x="30" y="75" width="40" height="50" rx="15" fill="#fda4af" stroke="#e11d48" stroke-width="2"/>
                <rect x="10" y="75" width="15" height="40" rx="7" fill="#fb7185"></rect>
                <rect x="75" y="75" width="15" height="40" rx="7" fill="#fb7185"></rect>
            </svg>
        </div>
    </div>

    <div class="footer">
        <input type="text" id="chatIn" placeholder="اكتبي لـ لونا...">
        <button onclick="send()">إرسال</button>
    </div>

    <script>
        let uName = "";
        const mouth = document.getElementById('mouth');

        function start() {
            uName = document.getElementById('nameIn').value || "عبير";
            document.getElementById('nameOverlay').style.display = 'none';
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utterThis = new SpeechSynthesisUtterance(text);
            
            // ضبط اللغة للعربية
            utterThis.lang = 'ar-SA';
            
            // لما تبدأ تتكلم، الفم يتحرك
            utterThis.onstart = () => mouth.classList.add('talking-mouth');
            
            // لما تخلص، الفم يثبت
            utterThis.onend = () => mouth.classList.remove('talking-mouth');
            
            synth.speak(utterThis);
        }

        function send() {
            let val = document.getElementById('chatIn').value;
            let m = document.getElementById('msg');
            if(!val) return;
            
            let response = "";
            if(val.includes("أحبك")) response = "وأنا كمان بحبك جداً يا " + uName + "!";
            else if(val.includes("مين رئيسك")) response = "إنتي طبعاً يا عبير! الملكة والمطورة بتاعتي.";
            else if(val.includes("نكتة")) response = "مرة مبرمج عطس قال إتش بي!";
            else response = "كلامك يجنن يا رئيستي، أنا سامعاكي كويس.";

            m.innerText = response;
            speak(response); // استدعاء دالة الصوت
            
            document.getElementById('chatIn').value = "";
        }
    </script>
</body>
</html>

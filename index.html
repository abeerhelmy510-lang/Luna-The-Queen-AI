<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA PRO AI ✨</title>
    <style>
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; background: #fff1f2; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* الهيدر */
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #fb7185; z-index: 100; }
        .store-btn { background: linear-gradient(45deg, #fb7185, #e11d48); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        /* المتجر المقسم (5 خانات) */
        #store { position: fixed; inset: 0; background: white; z-index: 2000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .tab-btn { min-width: 90px; padding: 12px; border-radius: 12px; border: 2px solid #fda4af; background: white; color: #e11d48; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: #fb7185; color: white; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #fff; border: 2px solid #fce7f3; border-radius: 20px; padding: 10px; text-align: center; }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 15px; background: #fff5f5; }

        /* منطقة لونا (المتحركة) */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        /* تأثير الحركة عند الكلام */
        @keyframes talkBody {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.03) translateY(-10px); }
            100% { transform: scale(1) translateY(0); }
        }
        .speaking { animation: talkBody 0.2s infinite ease-in-out !important; }

        #lunaDisplay { width: 100%; max-width: 280px; height: 380px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
        .bubble { background: white; border: 3px solid #fb7185; padding: 18px; border-radius: 25px; margin-bottom: 25px; width: 95%; text-align: center; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        /* خانة الكتابة الأساسية (تحت) */
        .footer { background: white; padding: 15px; display: flex; gap: 10px; border-top: 2px solid #fecdd3; }
        input { flex: 1; padding: 15px 20px; border: 2px solid #fda4af; border-radius: 30px; outline: none; font-size: 15px; }
        #sendBtn { background: #fb7185; color: white; border: none; padding: 0 25px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <button class="store-btn" onclick="toggleStore()">🛍️ المتجر</button>
        <div style="font-weight: bold; color: #fb7185;">LUNA AI SYSTEM 🎙️</div>
    </div>

    <div id="store">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="color:#e11d48; margin:0;">الخزائن الملكية 👑</h2>
            <button onclick="toggleStore()" style="background:none; border:none; font-size:30px; color:#fb7185; cursor:pointer;">✕</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'chars')">🎭 الشخصيات</button>
            <button class="tab-btn" onclick="openTab(event, 'clothes')">👗 ملابس</button>
            <button class="tab-btn" onclick="openTab(event, 'acc')">✨ إكسسوار</button>
            <button class="tab-btn" onclick="openTab(event, 'shoes')">👟 أحذية</button>
            <button class="tab-btn" onclick="openTab(event, 'voices')">🎙️ أصوات</button>
        </div>

        <div id="chars" class="tab-content active">
            <div class="grid">
                <div class="card" onclick="changeChar('https://cdn.pixabay.com/photo/2023/12/07/11/04/girl-8435329_1280.png')"><img src="https://cdn.pixabay.com/photo/2023/12/07/11/04/girl-8435329_1280.png"><b>لونا</b></div>
                <div class="card" onclick="changeChar('https://cdn.pixabay.com/photo/2023/11/27/08/17/ai-generated-8414844_1280.jpg')"><img src="https://cdn.pixabay.com/photo/2023/11/27/08/17/ai-generated-8414844_1280.jpg"><b>زين</b></div>
            </div>
        </div>

        <div id="clothes" class="tab-content" style="display:none;">
            <div class="grid">
                <div class="card" onclick="alert('🔒 اشتراك مطلوب')"><img src="https://cdn.pixabay.com/photo/2017/08/06/15/13/woman-2593366_1280.jpg"><b>طقم السهرة</b></div>
            </div>
        </div>

        <div id="acc" class="tab-content" style="display:none;">
            <div class="grid"><div class="card" onclick="alert('🔒 اشتراك مطلوب')"><b>👑 تاج ملكي</b></div></div>
        </div>

        <div id="shoes" class="tab-content" style="display:none;">
            <div class="grid"><div class="card" onclick="alert('🔒 اشتراك مطلوب')"><b>👠 حذاء زجاجي</b></div></div>
        </div>

        <div id="voices" class="tab-content" style="display:none;">
            <div class="grid">
                <div class="card" onclick="setVoice(1.2, 1, 'بنت ناعمة')">🎙️ بنت ناعمة</div>
                <div class="card" onclick="setVoice(0.7, 0.9, 'ولد فخم')">🎙️ ولد فخم</div>
                <div class="card" onclick="setVoice(1.5, 1.2, 'طفلة')">👶 طفلة</div>
                <div class="card" onclick="setVoice(0.5, 0.8, 'رجل عجوز')">👴 رجل عجوز</div>
                <div class="card" onclick="setVoice(1.1, 0.7, 'امرأة عجوز')">👵 امرأة عجوز</div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="bubble" id="msg">أهلاً بكِ! أنا لونا، جاهزة للكلام والتحرك معكِ الآن. اكتبي لي أي شيء بالأسفل! ✨</div>
        <img id="lunaDisplay" src="https://cdn.pixabay.com/photo/2023/12/07/11/04/girl-8435329_1280.png">
    </div>

    <div class="footer">
        <input type="text" id="chatIn" placeholder="اكتبي لـ لونا هنا...">
        <button id="sendBtn" onclick="send()">إرسال</button>
    </div>

    <script>
        let isAdmin = false;
        let currentPitch = 1.2;
        let currentRate = 1;
        const apiKey = "AIzaSyA2glGeNRIzxJPM3rN8DRRrYDC8NZD53fg";

        function speak(text) {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'ar-SA';
            speech.pitch = currentPitch;
            speech.rate = currentRate;
            const img = document.getElementById('lunaDisplay');
            speech.onstart = () => img.classList.add('speaking');
            speech.onend = () => img.classList.remove('speaking');
            window.speechSynthesis.speak(speech);
        }

        function toggleStore() { 
            const s = document.getElementById('store');
            s.style.display = (s.style.display === 'flex') ? 'none' : 'flex'; 
        }

        function openTab(evt, tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).style.display = 'block';
            evt.currentTarget.classList.add('active');
        }

        function setVoice(p, r, n) { 
            if(isAdmin) { currentPitch = p; currentRate = r; alert("تم تفعيل صوت: " + n); toggleStore(); }
            else { alert("🔒 هذا الصوت يحتاج اشتراك بفلوس!"); }
        }

        function changeChar(url) { 
            if(isAdmin) { document.getElementById('lunaDisplay').src = url; toggleStore(); }
            else { alert("🔒 اشتراك مطلوب للشخصية!"); }
        }

        async function send() {
            let val = document.getElementById('chatIn').value;
            if(val === "Abeer@2026#LunaPro") {
                isAdmin = true;
                let m = "تم تفعيل كود الملكة! كل الخانات والأصوات مفتوحة الآن يا رئيستي.";
                document.getElementById('msg').innerText = m; speak(m);
                document.getElementById('chatIn').value = ""; return;
            }
            
            document.getElementById('msg').innerText = "أفكر... 🔮";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });
                const data = await res.json();
                let reply = data.candidates[0].content.parts[0].text;
                document.getElementById('msg').innerText = reply;
                speak(reply);
            } catch (e) { document.getElementById('msg').innerText = "خطأ في الاتصال."; }
            document.getElementById('chatIn').value = "";
        }
    </script>
</body>
</html>

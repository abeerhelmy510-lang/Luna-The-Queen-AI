<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA VOICE & MOTION SYSTEM</title>
    <style>
        * { box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; background: #fff1f2; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #fb7185; }
        .store-btn { background: linear-gradient(45deg, #fb7185, #e11d48); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        #store { position: fixed; inset: 0; background: white; z-index: 2000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .tab-btn { min-width: 100px; padding: 10px; border-radius: 12px; border: 2px solid #fda4af; background: white; color: #e11d48; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #fb7185; color: white; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #fff; border: 2px solid #fce7f3; border-radius: 20px; padding: 10px; text-align: center; }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 15px; }

        /* الشاشة الرئيسية */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        /* انيميشن تحريك الفم/الجسم عند الكلام */
        @keyframes speaking {
            0% { transform: scale(1); }
            50% { transform: scale(1.03) translateY(-5px); }
            100% { transform: scale(1); }
        }
        .is-speaking { animation: speaking 0.2s infinite ease-in-out !important; }

        #lunaDisplay { width: 100%; max-width: 280px; height: 350px; object-fit: contain; }
        .bubble { background: white; border: 3px solid #fb7185; padding: 15px; border-radius: 20px; margin-bottom: 20px; width: 90%; text-align: center; font-weight: bold; }
        
        .footer { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px 20px; border-radius: 30px; border: 2px solid #fda4af; outline: none; }
        #sendBtn { background: #fb7185; color: white; border: none; border-radius: 30px; padding: 0 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <button class="store-btn" onclick="toggleStore()">🛍️ المتجر والأصوات</button>
        <div style="font-weight: bold; color: #fb7185;">LUNA PRO VOICE 🎙️</div>
    </div>

    <div id="store">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
            <h2 style="color: #e11d48; margin:0;">قائمة الميزات المدفوعة 💎</h2>
            <button onclick="toggleStore()" style="background:none; border:none; font-size:30px; color:#fb7185;">✕</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'chars')">🎭 الشخصيات</button>
            <button class="tab-btn" onclick="openTab(event, 'voices')">🎙️ الأصوات</button>
        </div>

        <div id="chars" class="tab-content active">
            <div class="grid">
                <div class="card" onclick="changeChar('https://cdn.pixabay.com/photo/2023/12/07/11/04/girl-8435329_1280.png', 'لونا')">
                    <img src="https://cdn.pixabay.com/photo/2023/12/07/11/04/girl-8435329_1280.png"><b>لونا</b>
                </div>
                <div class="card" onclick="changeChar('https://cdn.pixabay.com/photo/2023/11/27/08/17/ai-generated-8414844_1280.jpg', 'زين')">
                    <img src="https://cdn.pixabay.com/photo/2023/11/27/08/17/ai-generated-8414844_1280.jpg"><b>زين</b>
                </div>
            </div>
        </div>

        <div id="voices" class="tab-content">
            <div class="grid">
                <div class="card" onclick="setVoice('female', 'ناعم')">🎙️ صوت بنت ناعم <br> <small>(اشتراك 15ج)</small></div>
                <div class="card" onclick="setVoice('male', 'فخم')">🎙️ صوت ولد فخم <br> <small>(اشتراك 15ج)</small></div>
                <div class="card" onclick="setVoice('robot', 'آلي')">🤖 صوت روبوت <br> <small>(اشتراك 10ج)</small></div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="bubble" id="msg">مرحباً! تحدث معي وسأحرك فمي وأتكلم بصوتي الجديد! 🎙️</div>
        <img id="lunaDisplay" src="https://cdn.pixabay.com/photo/2023/12/07/11/04/girl-8435329_1280.png">
    </div>

    <div class="footer">
        <input type="text" id="chatIn" placeholder="اكتبي لـ لونا...">
        <button id="sendBtn" onclick="send()">إرسال</button>
    </div>

    <script>
        let isAdmin = false;
        let selectedGender = 'female'; 
        const apiKey = "AIzaSyA2glGeNRIzxJPM3rN8DRRrYDC8NZD53fg";

        function speak(text) {
            const speech = new SpeechSynthesisUtterance();
            speech.text = text;
            speech.lang = 'ar-SA';
            
            // ضبط حدة الصوت بناءً على الاختيار
            if(selectedGender === 'male') { speech.pitch = 0.5; speech.rate = 0.9; } 
            else if(selectedGender === 'robot') { speech.pitch = 2; speech.rate = 1.5; }
            else { speech.pitch = 1.2; speech.rate = 1; }

            // تفعيل حركة "الكلام"
            const img = document.getElementById('lunaDisplay');
            speech.onstart = () => img.classList.add('is-speaking');
            speech.onend = () => img.classList.remove('is-speaking');

            window.speechSynthesis.speak(speech);
        }

        function toggleStore() { document.getElementById('store').style.display = (document.getElementById('store').style.display === 'flex') ? 'none' : 'flex'; }
        
        function openTab(evt, tabName) {
            let contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
            document.getElementById(tabName).classList.add("active");
        }

        function setVoice(gender, name) {
            if(isAdmin) {
                selectedGender = gender;
                alert("تم تفعيل صوت: " + name);
                toggleStore();
            } else {
                alert("🔒 هذا الصوت يحتاج اشتراك بفلوس! استخدمي كود الملكة.");
            }
        }

        function changeChar(imgUrl, name) {
            if (isAdmin) {
                document.getElementById('lunaDisplay').src = imgUrl;
                toggleStore();
            } else { alert("🔒 اشتراك مطلوب للشخصيات."); }
        }

        async function send() {
            let val = document.getElementById('chatIn').value;
            if(val === "Abeer@2026#LunaPro") {
                isAdmin = true;
                let m = "تم تفعيل وضع الملكة! كل الأصوات والشخصيات متاحة الآن.";
                document.getElementById('msg').innerText = m;
                speak(m);
                document.getElementById('chatIn').value = "";
                return;
            }
            
            document.getElementById('msg').innerText = "جاري التحليل... 🔮";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });
                const data = await response.json();
                let reply = data.candidates[0].content.parts[0].text;
                document.getElementById('msg').innerText = reply;
                speak(reply);
            } catch (e) { document.getElementById('msg').innerText = "خطأ بالاتصال."; }
            document.getElementById('chatIn').value = "";
        }
    </script>
</body>
</html>
